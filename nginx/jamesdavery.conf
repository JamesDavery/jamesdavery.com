server {
    listen 80;
    server_name jamesdavery.com www.jamesdavery.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jamesdavery.com www.jamesdavery.com;

    ssl_certificate /etc/letsencrypt/live/jamesdavery.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamesdavery.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Static files (uploads)
    location /uploads/ {
        alias /var/www/jamesdavery/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
